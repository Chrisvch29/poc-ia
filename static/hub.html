<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevIAOps</title>

<script src="./VSS.SDK.min.js"></script>

<style>
body{
  font-family: Segoe UI, Arial;
  margin:0;
  background:#ffffff;
  color:#111;
  display:none;
}

header{
  padding:12px 20px;
  border-bottom:1px solid #eee;
  font-weight:600;
}

#chat{
  height:calc(100vh - 140px);
  overflow:auto;
  padding:20px;
}

.msg{
  max-width:800px;
  margin:10px auto;
  display:flex;
}

.user{ justify-content:flex-end; }
.bot{ justify-content:flex-start; }

.bubble{
  padding:10px 14px;
  border-radius:10px;
  font-size:14px;
  white-space:pre-wrap;
}

.user .bubble{
  background:#0078d4;
  color:white;
}

.bot .bubble{
  background:#f2f2f2;
}

#composer{
  border-top:1px solid #eee;
  padding:12px;
  display:flex;
  gap:10px;
}

textarea{
  flex:1;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
  resize:none;
  height:40px;
}

button{
  padding:10px 16px;
  border:none;
  background:#0078d4;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#106ebe;
}

.quick{
  padding:10px 20px;
  border-bottom:1px solid #eee;
  font-size:13px;
  color:#555;
}

.quick span{
  cursor:pointer;
  margin-right:10px;
  color:#0078d4;
}
</style>
</head>

<body>

<header>DevIAOps</header>

<div class="quick">
  <span onclick="sendQuick('crear repo pagos-api')">crear repo</span>
  <span onclick="sendQuick('crear rama feature/demo desde develop en repo pagos-api')">crear rama</span>
  <span onclick="sendQuick('elimina la rama feature/demo en repo pagos-api')">eliminar rama</span>
</div>

<div id="chat"></div>

<div id="composer">
  <textarea id="input" placeholder="Escribe una acción DevOps..."></textarea>
  <button onclick="send()">Enviar</button>
</div>

<script>

const API = "http://127.0.0.1:3000/api/chat";
const API_KEY = "super-secreto-123";  // tu API_KEY definida en backend
const SESSION = "user-" + Math.random().toString(36).substring(2);

VSS.init({ explicitNotifyLoaded:true, usePlatformStyles:true });

VSS.ready(()=>{
  document.body.style.display="block";
  VSS.notifyLoadSucceeded();
});

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, who){
  let row = document.createElement("div");
  row.className = "msg " + who;

  let bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

// Obtener token usuario Azure DevOps
async function getUserToken(){
  if(typeof VSS.getAccessToken === "function"){
    try{
      return await VSS.getAccessToken();
    }catch{
      return await new Promise(resolve=>{
        VSS.getAccessToken(t => resolve(t));
      });
    }
  }
  return null;
}

// Enviar mensaje al backend
async function send(){
  let text = input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value="";

  try{
    const token = await getUserToken();

    const headers = {
      "Content-Type": "application/json",
      "X-Api-Key": API_KEY
    };
    if(token) headers["Authorization"] = "Bearer " + token;

    let r = await fetch(API, {
      method:"POST",
      headers,
      body: JSON.stringify({ session: SESSION, message: text })
    });

    let data = await r.json().catch(()=>({}));
    if(!r.ok){
      const msg = data.reply || ("HTTP " + r.status);
      add("Error: " + msg, "bot");
      return;
    }

    add(data.reply || "(sin respuesta)", "bot");

  }catch(e){
    add("Error conectando con DevIAOps", "bot");
  }
}

function sendQuick(cmd){
  input.value = cmd;
  send();
}

// Enter = enviar, Shift+Enter = salto de línea
input.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

// Mensaje inicial del bot
add(
  "Hola 👋 soy DevIAOps.\n\n"+
  "Puedo ejecutar acciones:\n"+
  "- crear repo <nombre>\n"+
  "- crear rama <rama> desde <base> en repo <repo>\n"+
  "- eliminar ramas que NO sean develop/master\n\n"+
  "Antes de ejecutar cualquier acción, siempre pediré confirmación.\n"+
  "Describeme lo que necesitas y te guiaré.",
  "bot"
);

</script>

</body>
</html>
